    :root {
      --bg:#0f172a; --panel:#111827; --card:#ffffff; --ink:#111827; --muted:#64748b;
      --brand:#0ea5e9; --line:#e5e7eb; --soft:#f8fafc;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; font-family:Arial, Helvetica, sans-serif; background:var(--bg); color:var(--ink);
    }
    .hero {
      padding:34px 24px 24px; color:#fff; background:linear-gradient(135deg,#020617,#0f172a 55%,#075985);
    }
    .hero-inner { max-width:1180px; margin:0 auto; }
    h1 { margin:0 0 8px; font-size:34px; letter-spacing:-.03em; }
    .sub { color:#cbd5e1; font-size:15px; }
    .wrap { max-width:1180px; margin:0 auto; padding:22px 18px 40px; }
    .summary {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:12px; margin-bottom:18px;
    }
    .stat {
      background:#fff; border-radius:16px; padding:16px; box-shadow:0 10px 25px rgba(2,6,23,.14);
    }
    .stat b { display:block; font-size:25px; }
    .stat span { color:var(--muted); font-size:13px; }
    .track-card {
      background:#fff; border-radius:20px; margin:16px 0; overflow:hidden; border:1px solid var(--line);
      box-shadow:0 10px 25px rgba(2,6,23,.10);
    }
    .track-head {
      display:flex; justify-content:space-between; gap:12px; align-items:center;
      padding:18px 20px; background:#f8fafc; border-bottom:1px solid var(--line);
    }
    .track-head h2 { margin:0; font-size:22px; }
    .badge { background:#e0f2fe; color:#075985; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .section { padding:16px 20px 18px; border-bottom:1px solid var(--line); }
    .section:last-child { border-bottom:0; }
    .section h3 { margin:0 0 10px; font-size:14px; text-transform:uppercase; letter-spacing:.08em; color:#334155; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(235px,1fr)); gap:8px; }
    a.file {
      display:block; text-decoration:none; color:#0f172a; background:#fff; border:1px solid var(--line);
      border-radius:12px; padding:11px 12px; font-size:14px; line-height:1.25; transition:.15s ease;
      overflow-wrap:anywhere;
    }
    a.file:hover { border-color:var(--brand); transform:translateY(-1px); box-shadow:0 6px 14px rgba(14,165,233,.15); }
    .small { color:var(--muted); font-size:12px; margin-top:4px; }
    .footer { text-align:center; color:#94a3b8; font-size:12px; margin-top:28px; }
  </style>
</head>

    const labels = {
      tipsheets: "HTML Tipsheet",
      trackpdf: "Track PDF",
      racecards: "Racecards Intelligence Report",
      lead: "Lead Threat Index",
      pace: "Race Pace Reports"
    };

    function fileLabel(file) {
      return file
        .replace(/_/g, " ")
        .replace(/-/g, " ")
        .replace(/\.pdf$/i, "")
        .replace(/\.html$/i, "");
    }

    function sectionHTML(type, files) {
      if (!files || files.length === 0) return "";
      return `
        <section class="section">
          <h3>${labels[type]}</h3>
          <div class="grid">
            ${files.map(file => `
              <a class="file" href="${file}" target="_blank" rel="noopener">
                ${fileLabel(file)}
                <div class="small">${file}</div>
              </a>
            `).join("")}
          </div>
        </section>
      `;
    }

    document.getElementById("cards").innerHTML = tracks.map(track => {
      const total = Object.values(track.files).flat().length;
      if (!total) return "";
      return `
        <article class="track-card">
          <div class="track-head">
            <h2>${track.name}</h2>
            <div class="badge">${track.code} • ${total} files</div>
          </div>
          ${sectionHTML("tipsheets", track.files.tipsheets)}
          ${sectionHTML("trackpdf", track.files.trackpdf)}
          ${sectionHTML("racecards", track.files.racecards)}
          ${sectionHTML("lead", track.files.lead)}
          ${sectionHTML("pace", track.files.pace)}
        </article>
      `;
    }).join("");
